# generated by octocov init
coverage:
  if: true
testExecutionTime:
  if: true
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}/octocov-report
comment:
  if: is_pull_request
  hideFooterLink: true
  # deletePrevious: true
  # updatePrevious: true
summary:
  if: true
  hideFooterLink: true
report:
  # Only upload report for default branch
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}/octocov-report
